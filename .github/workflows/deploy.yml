# .github/workflows/fix-lock.yml
name: Fix package-lock.json (remove Windows-only deps)

on:
  workflow_dispatch:  # Запуск вручную через UI

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Remove lock and node_modules
        run: |
          rm -f package-lock.json
          rm -rf node_modules

      - name: Install dependencies (Linux-only)
        run: npm ci --omit=optional

      - name: Commit new package-lock.json
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add package-lock.json
          git commit -m "chore: regenerate package-lock.json on Linux (remove win32 deps)"
          git push
